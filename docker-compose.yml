services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_master
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Hotel.Api/Dockerfile
    container_name: hotel-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Master: Host=postgres;Port=5432;Database=hotel_master;Username=postgres;Password=postgres
      MASTER_CONNECTION_STRING: Host=postgres;Port=5432;Database=hotel_master;Username=postgres;Password=postgres
      TENANT_CONNECTION_STRING: Host=postgres;Port=5432;Database=hotel_sby;Username=postgres;Password=postgres
      Jwt__Issuer: hotel-system
      Jwt__Audience: hotel-system
      Jwt__Key: development-only-change-this-secret-key
      Cors__AllowedOrigins: http://localhost,http://localhost:3000,http://localhost:8080
      Cache__RedisConnection: redis:6379
    ports:
      - "5000:5000"

  redis:
    image: redis:7-alpine
    container_name: hotel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: hotel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: hotel-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
